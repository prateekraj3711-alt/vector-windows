<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: "Symbols Nerd Font Mono";
        src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@master/patched-fonts/NerdFontsSymbolsOnly/SymbolsNerdFontMono-Regular.ttf') format('truetype');
        font-display: block;
      }
    </style>
    <style>
      :root {
        --bg: #0b0b0f;
        --fg: #e6e6e6;
        --muted: #8a8aa0;
        --elev: #14141c;
        --elev-hi: #1c1c26;
        --border: #2a2a36;
        --active-bg: #23233a;
        --active-border: #3a3a55;
        --tab-close: #6a6a80;
      }
      .theme-light {
        /* Solarized Light */
        --bg: #fdf6e3;
        --fg: #586e75;
        --muted: #93a1a1;
        --elev: #eee8d5;
        --elev-hi: #e3dcc3;
        --border: #d7d0b5;
        --active-bg: #e8dfb8;
        --active-border: #b58900;
        --tab-close: #93a1a1;
      }
      html, body, #root { height: 100%; width: 100%; margin: 0; color: var(--fg); font-family: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
      body, #root { background: var(--bg); }
      code, pre, .mono, .term-wrap { font-family: "JetBrains Mono", "Symbols Nerd Font Mono", ui-monospace, "SF Mono", Menlo, "Apple Symbols", "Apple Color Emoji", "Segoe UI Symbol", monospace; }
      #root { display: flex; flex-direction: column; }

      /* All buttons inherit theme by default. Suppress macOS native styling. */
      button { appearance: none; -webkit-appearance: none; background: var(--elev); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font: inherit; font-size: 12px; cursor: pointer; transition: background .12s, border-color .12s, color .12s; box-shadow: none; }
      button:hover { background: var(--elev-hi); }
      button:active { background: var(--active-bg); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .topbar { flex: 0 0 auto; padding: 6px 10px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
      .topbar select { background: var(--elev); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font: inherit; cursor: pointer; }
      .topbar .spacer { flex: 1; }
      .ctx-meter { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); user-select: none; background: transparent; border: 1px solid transparent; height: 26px; box-sizing: border-box; padding: 0 8px; cursor: pointer; }
      .ctx-meter:hover { background: var(--elev); border-color: var(--border); }
      .ctx-label { font-weight: 500; color: var(--fg); }
      .ctx-bar { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
      .ctx-fill { height: 100%; transition: width .3s ease, background-color .2s ease; background: #6a8dff; }
      .ctx-ok .ctx-fill { background: #6a8dff; }
      .ctx-warn .ctx-fill { background: #ffb347; }
      .ctx-crit .ctx-fill { background: #ff5a5a; }
      .ctx-num { font-variant-numeric: tabular-nums; min-width: 30px; text-align: right; }
      .ctx-reset { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
      .ctx-warn .ctx-num { color: #ffb347; }
      .ctx-crit .ctx-num { color: #ff5a5a; font-weight: 600; }
      .usage-card { width: min(520px, 92vw); }
      .usage-profile-tag { margin-left: 8px; padding: 1px 7px; border-radius: 999px; font-size: 10px; font-family: "JetBrains Mono", monospace; color: #1a1a0f; background: var(--border); letter-spacing: 0.03em; }
      .usage-head-actions { display: flex; gap: 8px; align-items: center; }
      .usage-body { display: flex; flex-direction: column; gap: 16px; margin-top: 14px; }
      .usage-row { display: flex; flex-direction: column; gap: 6px; }
      .usage-row-head { display: flex; justify-content: space-between; align-items: baseline; }
      .usage-row-label { font-size: 13px; font-weight: 600; color: var(--fg); }
      .usage-row-num { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
      .usage-bar { height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
      .usage-fill { height: 100%; transition: width .3s ease; background: #6a8dff; }
      .usage-bar.ctx-warn .usage-fill { background: #ffb347; }
      .usage-bar.ctx-crit .usage-fill { background: #ff5a5a; }
      .usage-row-reset { font-size: 11px; color: var(--muted); }
      .ctx-banner { flex: 0 0 auto; padding: 6px 10px; font-size: 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid color-mix(in srgb, #ffb347 40%, var(--border)); background: color-mix(in srgb, #ffb347 15%, transparent); color: var(--fg); }
      .ctx-banner.crit { border-bottom-color: color-mix(in srgb, #ff5a5a 50%, var(--border)); background: color-mix(in srgb, #ff5a5a 18%, transparent); }

      .shell { flex: 1 1 auto; min-height: 0; display: flex; }
      .shell.horizontal { flex-direction: column; }
      .shell.vertical { flex-direction: row; }

      .tabs { display: flex; gap: 4px; align-items: center; }
      .shell.horizontal .tabs-container { flex: 0 0 auto; padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; overflow-x: auto; }
      .shell.horizontal .tabs { flex-direction: row; }
      .shell.vertical .tabs-container { flex: 0 0 auto; width: 180px; padding: 8px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
      .shell.vertical .tabs { flex-direction: column; align-items: stretch; }
      .shell.vertical .tab { max-width: none; }

      .tab { display: flex; gap: 6px; align-items: center; padding: 2px 6px 2px 4px; background: var(--elev); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; user-select: none; max-width: 180px; font-size: 11px; line-height: 1.2; }
      .shell.horizontal .tab.active { max-width: 300px; }
      .tab:hover { background: var(--elev-hi); }
      .tab.active { background: var(--active-bg); color: var(--fg); border-color: var(--active-border); }
      .tab.bell { box-shadow: 0 0 0 2px #d97706; }
      .tab { position: relative; }
      .tab.drop-before::before,
      .tab.drop-after::after { content: ""; position: absolute; top: 2px; bottom: 2px; width: 3px; background: #ff8a4c; border-radius: 2px; pointer-events: none; }
      .tab.drop-before::before { left: -3px; }
      .tab.drop-after::after  { right: -3px; }
      .tab-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
      .tab-rename { flex: 1; min-width: 40px; background: var(--bg); color: var(--fg); border: 1px solid #ff8a4c; border-radius: 4px; padding: 1px 4px; font: inherit; font-size: 12px; outline: none; }
      .tab-rename::placeholder { color: var(--muted); }
      .tab-close { color: var(--tab-close); padding: 0 4px; border-radius: 2px; font-size: 12px; }
      .tab-close:hover { background: var(--border); color: var(--fg); }
      .tab-new { padding: 1px 6px; font-size: 12px; }
      .agent-chip { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; flex: 0 0 auto; }

      .terms { flex: 1 1 auto; min-height: 0; min-width: 0; position: relative; display: flex; --pane-radius: 10px; }
      .tab-panes { flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; position: relative; }
      .tab-panes-layout { flex: 1 1 auto; min-height: 0; min-width: 0; position: relative; }
      .pane { display: flex; position: relative; border: 1px solid var(--border); box-sizing: border-box; }
      .pane.pane-active { border-color: rgba(255,138,76,0.55); z-index: 2; }
      .pane.pane-solo, .pane.pane-solo.pane-active { border-color: transparent; }
      .split { flex: 1 1 auto; min-height: 0; min-width: 0; display: flex; }
      .split.split-row { flex-direction: row; }
      .split.split-column { flex-direction: column; }
      .split-child { display: flex; min-width: 0; min-height: 0; }
      .divider { background: transparent; flex: 0 0 auto; position: relative; z-index: 3; }
      .divider.divider-row { width: 4px; cursor: col-resize; }
      .divider.divider-column { height: 4px; cursor: row-resize; }
      .divider:hover { background: #ff8a4c; }
      .pane-titlebar {
        position: absolute; top: 0; left: 0; right: 0; height: 22px;
        display: flex; align-items: center; gap: 6px;
        padding: 0 8px;
        background: var(--titlebar-bg, rgba(255,255,255,0.04));
        border-bottom: 1px solid var(--border);
        font-size: 11.5px; color: var(--muted);
        cursor: grab; user-select: none;
        z-index: 2;
        box-sizing: border-box;
      }
      .pane-titlebar:active { cursor: grabbing; }
      .pane-grip-dots { color: var(--muted); opacity: 0.7; }
      .pane-agent-chip { display: inline-flex; align-items: center; }
      .pane-title-label {
        flex: 1; color: var(--fg);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .pane-rename {
        flex: 1; background: transparent; border: 0; color: var(--fg);
        font: inherit; outline: none; padding: 0;
      }
      .pane-close { color: var(--muted); cursor: pointer; padding: 0 4px; }
      .pane-close:hover { color: var(--fg); }
      body.theme-light .pane-titlebar { background: rgba(0,0,0,0.04); }
      .tab-pane-count { background: var(--border); color: var(--fg); font-size: 10px; font-weight: 600; border-radius: 10px; padding: 1px 6px; min-width: 16px; text-align: center; }
      .tab.active .tab-pane-count { background: #ff8a4c; color: #1a1a0f; }
      .term-wrap { flex: 1 1 auto; min-height: 0; min-width: 0; padding: 6px 8px; background: var(--bg); box-sizing: border-box; overflow: hidden; }
      .term-wrap .xterm { width: 100%; height: 100%; }
      .term-wrap .xterm-viewport { overflow-y: auto; }
      .empty { margin: auto; color: var(--muted); }

      .icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; padding: 0; }
      .project-btn { display: inline-flex; align-items: center; gap: 6px; max-width: 260px; padding: 3px 10px; color: var(--fg); }
      .project-btn:hover { background: var(--elev-hi); }
      .project-dot { width: 6px; height: 6px; border-radius: 50%; background: #ff8a4c; display: inline-block; }

      .settings { position: relative; display: flex; gap: 6px; align-items: center; }

      /* Settings modal */
      .settings-modal-card { width: 50vw !important; height: 70vh !important; max-width: none !important; max-height: none !important; padding: 0; display: flex; flex-direction: column; overflow: hidden; }
      .settings-modal-header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
      .settings-modal-header .picker-brand { font-weight: 600; letter-spacing: 0.4px; }
      .settings-modal-body { flex: 1 1 auto; display: grid; grid-template-columns: 200px 1fr; min-height: 0; }
      .settings-sidebar { background: color-mix(in srgb, var(--bg) 50%, var(--elev)); border-right: 1px solid var(--border); padding: 14px 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
      .settings-nav-heading { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 12px 4px; }
      .settings-nav-heading:first-child { padding-top: 4px; }
      .settings-nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-radius: 6px; color: var(--muted); font-size: 13px; cursor: pointer; background: transparent; border: 1px solid transparent; text-align: left; }
      .settings-nav-item:hover { background: var(--elev-hi); color: var(--fg); }
      .settings-nav-item.active { background: var(--active-bg); color: var(--fg); border-color: var(--active-border); }
      .settings-content { padding: 22px 26px; overflow-y: auto; overflow-x: hidden; min-width: 0; display: flex; flex-direction: column; gap: 18px; }
      .settings-section-title { font-size: 16px; font-weight: 600; color: var(--fg); margin: 0; }
      .settings-section-sub { font-size: 12px; color: var(--muted); margin: -10px 0 4px; line-height: 1.5; max-width: 540px; }
      .settings-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 8px 0; gap: 12px; }
      .settings-row span { color: var(--fg); }
      .settings-row-col { flex-direction: column; align-items: stretch; gap: 4px; }
      .settings-input { background: transparent; color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font: inherit; min-width: 0; flex: 1; max-width: 360px; }
      .settings-input-sm { flex: 0 0 88px; max-width: 88px; }
      .settings-textarea { background: transparent; color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 8px; font: 12px/1.4 "JetBrains Mono", monospace; resize: vertical; width: 100%; box-sizing: border-box; margin-top: 6px; }
      .settings-hint { color: var(--muted); font-size: 11.5px; }
      .seg { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
      .seg button { border: none; border-radius: 0; padding: 4px 12px; background: transparent; color: var(--muted); font-size: 12px; }
      .seg button.on { background: var(--active-bg); color: var(--fg); }
      .linkish { background: transparent; border: none; color: #ff8a4c; padding: 0; cursor: pointer; font: inherit; }

      .shortcuts-list { display: grid; grid-template-columns: max-content 1fr; column-gap: 16px; row-gap: 10px; align-items: center; font-size: 13px; }
      .shortcut-row { display: contents; }
      .shortcut-keys { display: inline-flex; align-items: center; gap: 4px; justify-self: start; }
      .kbd { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 6px; background: linear-gradient(180deg, var(--elev-hi), var(--elev)); border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; color: var(--fg); font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-size: 11px; font-weight: 500; line-height: 1; box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
      .kbd svg { display: block; }
      .kbd-plus { color: var(--muted); font-size: 11px; padding: 0 1px; }
      .shortcut-label { color: var(--muted); justify-self: start; }

      /* Claude Profiles section */
      .profiles-list { display: flex; flex-direction: column; gap: 8px; }
      .profile-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        background: var(--elev);
        border: 1px solid var(--border);
        border-radius: 10px;
        min-width: 0;
      }
      .profile-avatar { flex: 0 0 auto; width: 34px; height: 34px; border-radius: 8px; display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 700; color: #1a1a0f; }
      .profile-name-wrap { flex: 1 1 auto; min-width: 90px; display: flex; flex-direction: column; gap: 5px; }
      .profile-name-line { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .profile-name { font-size: 13.5px; font-weight: 600; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .profile-tag { flex: 0 0 auto; font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--muted); padding: 1px 6px; border: 1px solid var(--border); border-radius: 999px; text-transform: uppercase; letter-spacing: 0.5px; }
      .profile-folders { display: flex; flex-wrap: wrap; gap: 4px; min-width: 0; }
      .folder-chip { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted); padding: 2px 7px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; display: inline-flex; align-items: center; gap: 5px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .folder-chip .x { color: var(--tab-close); cursor: pointer; font-size: 12px; line-height: 1; }
      .folder-chip .x:hover { color: var(--fg); }

      /* Folder list popover trigger (profile row) */
      .folders-trigger { position: relative; display: inline-block; font-size: 11.5px; color: var(--muted); border-bottom: 1px dashed var(--border); cursor: help; align-self: flex-start; outline: none; }
      .folders-trigger:hover, .folders-trigger:focus-visible { color: var(--fg); border-bottom-color: var(--fg); }
      .folders-popover {
        position: absolute; top: calc(100% + 6px); left: 0;
        min-width: 240px; max-width: 420px;
        background: var(--elev); border: 1px solid var(--border); border-radius: 8px;
        padding: 6px;
        display: none; flex-direction: column; gap: 2px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.35);
        z-index: 20;
      }
      .folders-trigger:hover .folders-popover,
      .folders-trigger:focus-visible .folders-popover,
      .folders-trigger:focus-within .folders-popover { display: flex; }
      .folders-popover-item {
        font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
        font-size: 11.5px; color: var(--fg); padding: 4px 8px; border-radius: 4px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .folders-popover-item:hover { background: var(--elev-hi); }
      .profile-email { flex: 0 1 180px; max-width: 180px; min-width: 0; text-align: right; font-size: 11.5px; color: var(--muted); display: flex; flex-direction: column; gap: 2px; }
      .profile-email .em { color: var(--fg); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .profile-actions { flex: 0 0 auto; display: flex; gap: 4px; }
      .profile-actions .icon-btn { width: 28px; height: 28px; }
      .profile-add { margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1.5px dashed var(--border); border-radius: 10px; color: var(--muted); font-size: 13px; cursor: pointer; background: transparent; transition: color .15s, border-color .15s; }
      .profile-add:hover { color: #ff8a4c; border-color: #ff8a4c; }

      /* Profile dialog (add/edit) */
      .profile-dialog { width: 440px; max-width: 100%; padding: 20px 22px 18px; display: flex; flex-direction: column; gap: 14px; }
      .profile-dialog h3 { margin: 0; font-size: 16px; font-weight: 600; color: var(--fg); }
      .profile-field { display: flex; flex-direction: column; gap: 6px; }
      .profile-field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
      .profile-field input[type="text"] { padding: 7px 10px; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 13px; outline: none; }
      .profile-field input[type="text"]:focus { border-color: #ff8a4c; }
      .folder-picker-btn { padding: 8px 10px; background: var(--bg); color: var(--muted); border: 1px dashed var(--border); border-radius: 6px; font: inherit; font-size: 12px; text-align: left; cursor: pointer; }
      .folder-picker-btn:hover { border-color: #ff8a4c; color: #ff8a4c; }
      .color-swatches { display: flex; gap: 8px; }
      .color-swatch { width: 24px; height: 24px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
      .color-swatch.on { border-color: var(--fg); }
      .profile-advanced { border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
      .profile-advanced > summary { cursor: pointer; padding: 9px 12px; font-size: 12px; color: var(--muted); list-style: none; outline: none; user-select: none; display: flex; align-items: center; gap: 8px; }
      .profile-advanced > summary::-webkit-details-marker { display: none; }
      .profile-advanced > summary::before {
        content: "";
        display: inline-block;
        width: 0; height: 0;
        border-left: 6px solid currentColor;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        margin-right: 2px;
        transition: transform .15s ease;
        transform-origin: 25% 50%;
      }
      .profile-advanced[open] > summary::before { transform: rotate(90deg); }
      .profile-advanced[open] > summary { color: var(--fg); border-bottom: 1px solid var(--border); }
      .profile-advanced > .profile-field { padding: 10px 12px 12px; }
      .profile-dialog-foot { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 14px; }
      .btn-primary { background: #ff8a4c; color: #1a1a0f; border: 1px solid #ff8a4c; border-radius: 6px; padding: 6px 14px; font-weight: 600; cursor: pointer; font-size: 12px; }
      .btn-primary:hover { background: #ffa066; border-color: #ffa066; }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Profile pill on Claude tabs */
      .profile-pill { display: inline-flex; align-items: center; gap: 4px; padding: 1px 6px 1px 4px; border-radius: 999px; font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.03em; background: var(--elev); border: 1px solid var(--border); color: var(--fg); cursor: pointer; max-width: 110px; }
      .profile-pill:hover { background: var(--elev-hi); }
      .profile-pill .pdot { width: 5px; height: 5px; border-radius: 50%; flex: 0 0 auto; }
      .profile-pill .pname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .profile-pill .pcaret { font-size: 7px; opacity: 0.6; margin-left: 1px; }
      .profile-dropdown { position: absolute; top: calc(100% + 4px); left: 0; min-width: 200px; background: var(--elev); border: 1px solid var(--border); border-radius: 8px; padding: 4px; z-index: 30; box-shadow: 0 12px 30px rgba(0,0,0,0.45); font-size: 12.5px; }
      .profile-dd-head { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; padding: 6px 10px 4px; }
      .profile-dd-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 5px; cursor: pointer; color: var(--fg); }
      .profile-dd-item:hover { background: var(--elev-hi); }
      .profile-dd-item .dd-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }

      .picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; backdrop-filter: blur(3px); }

      .picker-card { width: 460px; max-width: 100%; background: var(--elev); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px 22px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.55); }
      .picker-brand { display: flex; align-items: center; gap: 8px; color: var(--fg); font-weight: 600; letter-spacing: 0.5px; }
      .picker h2 { margin: 8px 0 0; font-size: 18px; font-weight: 600; color: var(--fg); }

      .picker-primary:hover, .picker-primary:active { background: #ffa066; border-color: #ffa066; color: #1a1a0f; filter: none; }

      .recent-row { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; padding: 6px 8px; background: transparent; border: 1px solid transparent; border-radius: 6px; color: var(--fg); text-align: left; cursor: pointer; }

      .recent-x { background: transparent; border: none; color: var(--tab-close); font-size: 16px; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
      .recent-x:hover { background: var(--border); color: var(--fg); }

      .picker-card--wide { width: 860px; max-width: 100%; padding: 14px 16px 16px; max-height: calc(100vh - 40px); min-height: 0; overflow: hidden; }
      .picker-head { display: flex; align-items: center; }
      .picker-head-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
      .picker-head-right select { background: var(--elev); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 24px 4px 10px; font: inherit; font-size: 12px; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238a8aa0' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 8px center; background-size: 12px; cursor: pointer; }
      .picker-head-right select:hover { background-color: var(--elev-hi); }
      .picker-head-right select:focus { outline: none; border-color: #ff8a4c; }
      .picker-head-right .picker-primary { padding: 5px 12px; font-size: 12px; font-weight: 600; align-self: auto; border-radius: 6px; }
      .session-body { display: grid; grid-template-columns: 320px 1fr; gap: 14px; margin-top: 12px; height: 460px; }
      .session-list { display: flex; flex-direction: column; gap: 8px; padding: 2px; min-height: 0; }
      .session-rows { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; min-height: 0; flex: 1; padding-right: 2px; }
      .session-new { padding: 8px 12px; background: transparent; color: var(--fg); border: 1px dashed var(--border); border-radius: 8px; font-weight: 500; font-size: 13px; cursor: pointer; text-align: left; transition: border-color .15s, background .15s; }
      .session-new:hover { border-color: #ff8a4c; background: color-mix(in srgb, #ff8a4c 10%, transparent); color: #ff8a4c; }
      .session-search { padding: 7px 10px; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 13px; outline: none; transition: border-color .15s; }
      .session-search::placeholder { color: var(--muted); }
      .session-search:focus { border-color: #ff8a4c; }
      .session-row { display: flex; flex-direction: column; align-items: stretch; gap: 4px; padding: 10px 12px; background: transparent; border: 1px solid transparent; border-radius: 8px; color: var(--fg); text-align: left; cursor: pointer; font: inherit; transition: background .12s, border-color .12s; }
      .session-row:hover { background: var(--elev-hi); }
      .session-row.selected { background: var(--active-bg); border-color: var(--active-border); }
      .session-title { font-size: 13px; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--fg); }
      .session-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
      .session-preview { border: 1px solid var(--border); border-radius: 8px; background: var(--bg); display: flex; flex-direction: column; min-height: 0; }
      .session-preview-head { padding: 10px 12px; border-bottom: 1px solid var(--border); }
      .session-preview-title { font-size: 13px; color: var(--fg); }
      .session-preview-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
      .session-preview-body { flex: 1 1 auto; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
      .session-preview-actions { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
      .msg { display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; border-radius: 6px; }
      .msg--user { background: color-mix(in srgb, var(--active-bg) 50%, transparent); }
      .msg--assistant { background: transparent; }
      .msg--sys { padding: 3px 6px; color: var(--muted); font-size: 11px; font-style: italic; opacity: 0.75; }
      .msg--recap { padding: 8px 10px; background: color-mix(in srgb, #6a8dff 10%, transparent); border: 1px solid color-mix(in srgb, #6a8dff 30%, transparent); border-radius: 8px; display: flex; flex-direction: column; gap: 6px; }
      .msg--recap > summary { cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; color: #6a8dff; list-style: none; outline: none; user-select: none; }
      .msg--recap > summary::-webkit-details-marker { display: none; }
      .msg--recap > summary::before { content: "▸ "; display: inline-block; transition: transform .12s; }
      .msg--recap[open] > summary::before { transform: rotate(90deg); }
      .msg--recap > .msg-text { font-size: 12px; max-height: 320px; overflow-y: auto; }
      .session-badge { margin-left: 6px; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #6a8dff; background: color-mix(in srgb, #6a8dff 15%, transparent); border: 1px solid color-mix(in srgb, #6a8dff 35%, transparent); vertical-align: middle; }
      .msg-role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; color: var(--muted); }
      .msg--user .msg-role { color: #ff8a4c; }
      .msg--assistant .msg-role { color: #6a8dff; }
      .msg-text { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.5; color: var(--fg); font-family: "Noto Sans", -apple-system, sans-serif; }
      .msg--assistant .msg-text { color: color-mix(in srgb, var(--fg) 85%, var(--muted) 15%); }
      .session-muted { color: var(--muted); padding: 10px 12px; font-size: 12px; }

      .update-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; flex-direction: column; padding: 8px 14px; background: linear-gradient(90deg, rgba(255,138,76,0.92), rgba(255,138,76,0.82)); border-bottom: 1px solid rgba(255,138,76,0.55); color: #1a1a0f; font-size: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.25); }
      .update-banner .update-btn { background: #1a1a0f; color: #fff5e8; border: none; border-radius: 4px; padding: 4px 10px; font-weight: 600; cursor: pointer; font: inherit; }
      .update-banner .icon-btn { color: #1a1a0f; border-color: rgba(0,0,0,0.25); margin-left: auto; }
      .update-banner .update-status { color: rgba(26,26,15,0.75); }
      .update-row { display: flex; align-items: center; gap: 10px; }
      .update-notes-btn { background: transparent; color: #1a1a0f; border: 1px solid rgba(0,0,0,0.3); border-radius: 4px; padding: 3px 10px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; }
      .update-notes-btn:hover { background: rgba(0,0,0,0.08); }

      .whatsnew-card { width: 580px; max-width: 100%; max-height: calc(100vh - 80px); display: flex; flex-direction: column; gap: 10px; padding: 16px 20px 18px; }
      .whatsnew-body { overflow-y: auto; padding: 4px 2px 6px; color: var(--fg); font-size: 13px; line-height: 1.55; display: flex; flex-direction: column; gap: 10px; }
      .whatsnew-body .wn-h { margin: 8px 0 0; font-size: 13px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; color: var(--muted); }
      .whatsnew-body .wn-h:first-child { margin-top: 0; }
      .whatsnew-body p { margin: 0; }

      .whatsnew-body strong { color: var(--fg); font-weight: 600; }
      .whatsnew-body code { background: var(--elev-hi); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-size: 12px; }
      .whatsnew-body a { color: #ff8a4c; text-decoration: none; }

      .update-toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 120; background: var(--elev); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

      /* Right-click menu for terminal links */
      .link-ctx-menu {
        position: fixed; z-index: 200; width: 200px;
        background: var(--elev); border: 1px solid var(--border); border-radius: 8px;
        padding: 4px; display: flex; flex-direction: column; gap: 2px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.5);

        background: transparent; border: none; color: var(--fg);

      .agent-switcher { width: 520px; max-width: 90vw; padding: 0; overflow: hidden; }

        width: 100%; box-sizing: border-box; padding: 14px 18px;

        font-size: 15px; outline: none;
      }
      .switcher-list { max-height: 360px; overflow-y: auto; padding: 6px 0; }

        display: flex; align-items: center; gap: 10px;
